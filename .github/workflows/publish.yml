name: Build and publish

# On every push to main, rebuild the dist/ payload (catalog + hash-stamped
# skill packages) and push it to the release branch. jsdelivr mirrors the
# release branch automatically; clients fetch from there. The final step
# purges jsdelivr's edge cache so users see new skills within ~1 minute
# instead of waiting up to 12h for the natural refresh cycle.

on:
  push:
    branches: [main]
    paths:
      # Skill payload — anything under skill/ ships into core/ on release.
      - "contributions/*/skill/**"
      # Catalog input — meta.json fields land in store/catalog.json. Other
      # files under manifest/ (README.md, images for the README, …) only feed
      # GitHub web rendering and must NOT cost a rebuild + CDN refetch.
      - "contributions/*/manifest/meta.json"
      # CI tooling itself.
      - "scripts/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build store
        run: node scripts/build-store.mjs

      - name: Refresh download counts (best-effort)
        run: |
          CATALOG_PATH=dist/store/catalog.json node scripts/aggregate-stats.mjs || \
            echo "Stats refresh failed (non-fatal at publish time)"

      - name: Deploy to release branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: release
          folder: dist
          clean: true
          commit-message: "chore: rebuild from ${{ github.sha }}"

      # Force jsdelivr to drop its cached catalog.json and refetch from the
      # release branch. Without this, clients see the stale catalog for up
      # to 12h. SKILL files don't need purging — their content-hashed
      # filenames already bypass the CDN cache for new versions.
      - name: Purge jsdelivr cache
        run: |
          curl -sfL "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/store/catalog.json" \
            || echo "jsdelivr purge failed (non-fatal — cache will refresh within 12h anyway)"

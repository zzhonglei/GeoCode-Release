name: Build and publish

# On every push to main, rebuild the dist/ payload (catalog + hash-stamped
# skill packages) and push it to the release branch. jsdelivr mirrors the
# release branch automatically; clients fetch from there.
#
# The final purge step is *conditional*: it only runs when this build
# actually moved the release branch tip. Re-runs that produce identical
# dist/ (no commit pushed) skip the purge to avoid burning jsdelivr's
# per-URL throttle budget on no-op refreshes. When it does run, it
# sleeps 2 minutes first so jsdelivr's upstream view of the GitHub repo
# has time to see the new commit — purging before propagation makes
# jsdelivr cache the *old* content for another 12h.

on:
  push:
    branches: [main]
    paths:
      # Skill payload — anything under skill/ ships into core/ on release.
      - "contributions/*/skill/**"
      # Catalog input — meta.json fields land in store/catalog.json. Other
      # files under manifest/ (README.md, images for the README, …) only feed
      # GitHub web rendering and must NOT cost a rebuild + CDN refetch.
      - "contributions/*/manifest/meta.json"
      # CI tooling itself.
      - "scripts/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build store
        run: node scripts/build-store.mjs

      # Preserve the running stats-history.json across the `clean: true` deploy
      # below. aggregate-stats.mjs records per-hash hit peaks in this file so
      # download counts survive jsdelivr's year-window aging; if we let the
      # clean deploy wipe it, every publish would silently reset the running
      # peaks and the next stats refresh would lose any data that has aged out
      # of the year window.
      - name: Preserve stats history from release
        run: |
          git fetch origin release --depth 1 || true
          mkdir -p dist/store
          if git show origin/release:store/stats-history.json > dist/store/stats-history.json 2>/dev/null; then
            echo "Preserved existing stats-history.json ($(wc -l < dist/store/stats-history.json) lines)"
          else
            echo "{}" > dist/store/stats-history.json
            echo "Initialized empty stats-history.json (no prior history on release)"
          fi

      - name: Refresh download counts (best-effort)
        run: |
          CATALOG_PATH=dist/store/catalog.json node scripts/aggregate-stats.mjs || \
            echo "Stats refresh failed (non-fatal at publish time)"

      # Snapshot the release branch tip before deploy so we can decide
      # afterwards whether the deploy actually changed anything.
      - name: Capture pre-deploy release SHA
        id: pre
        run: echo "sha=$(git ls-remote origin release | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Deploy to release branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: release
          folder: dist
          clean: true
          commit-message: "chore: rebuild from ${{ github.sha }}"

      - name: Capture post-deploy release SHA
        id: post
        run: echo "sha=$(git ls-remote origin release | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      # Sleep 2 minutes before purge: jsdelivr's "is the GitHub branch
      # newer than my cache?" check lags GitHub by tens of seconds to
      # a couple of minutes. Purging immediately after deploy makes
      # jsdelivr's first refetch see the *old* commit and re-cache it.
      - name: Wait for GitHub propagation
        if: steps.pre.outputs.sha != steps.post.outputs.sha
        run: sleep 120

      # Force jsdelivr to drop its cached catalog.json and refetch the
      # now-propagated commit. SKILL files don't need purging — their
      # content-hashed filenames already bypass the CDN cache.
      - name: Purge jsdelivr cache
        if: steps.pre.outputs.sha != steps.post.outputs.sha
        run: |
          curl -sfL "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/store/catalog.json" \
            || echo "jsdelivr purge failed (non-fatal — cache will refresh within 12h anyway)"

      - name: Skip purge (no release change)
        if: steps.pre.outputs.sha == steps.post.outputs.sha
        run: echo "Release branch unchanged (${{ steps.pre.outputs.sha }}); skipping purge to preserve jsdelivr throttle budget."

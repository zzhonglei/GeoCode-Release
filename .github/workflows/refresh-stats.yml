name: Refresh download counts

# Hourly cron that re-harvests jsdelivr stats into the date-bucket ledger and
# updates downloadCount in the CATALOG branch's store/catalog.json. The catalog
# (and its stats-history.json ledger) live on the `catalog` branch; the
# aggregator is fetched from main (the catalog branch has no scripts/ dir).
#
# Note: the `catalog` branch is created by the first publish. Until that runs,
# this cron's checkout will fail (harmless — it just retries next hour).

on:
  schedule:
    - cron: "13 * * * *" # 13min past each hour, off-peak
  workflow_dispatch:

permissions:
  contents: write

# Share the branch-write lock with publish.yml so the two never race on the
# catalog branch (a cron push and a publish clean-merge must not interleave).
# Must match publish.yml's group exactly.
concurrency:
  group: branch-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: catalog
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Fetch aggregator script from main
        run: |
          mkdir -p .ci
          curl -sfL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/aggregate-stats.mjs" \
            -o .ci/aggregate-stats.mjs

      # Default CATALOG_PATH is ./store/catalog.json — correct on the catalog
      # branch. aggregate reads ./store/stats-history.json (the ledger) beside it.
      - name: Refresh stats
        run: node .ci/aggregate-stats.mjs

      - name: Commit if changed
        run: |
          rm -rf .ci
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage both catalog.json (downloadCount) and stats-history.json (ledger).
          git add -A store/
          if git diff --cached --quiet; then
            echo "No catalog or ledger changes."
            exit 0
          fi
          git commit -m "chore: refresh download counts"
          git push

name: Fold release into catalog (one-time migration)

# ONE-TIME, manually-dispatched migration. Folds the `release` population's lifetime
# download contribution into the catalog ledger as a frozen seed, then drops
# ledger.release entirely — making the catalog branch's stats fully self-contained so
# the release branch can later be retired/deleted with ZERO impact on downloadCount.
# See docs/stats-two-branch-design.md.
#
# PRECONDITION: aggregate-stats.mjs on main must ALREADY carry QUERY_REFS = ["catalog"]
# (release no longer harvested) and correct-baseline must be retired. Otherwise the
# next harvest / baseline-correction would re-create ledger.release and undo the fold.
#
# Idempotent: fold-release-into-catalog.mjs is a no-op once ledger.release is gone, so
# an accidental re-run is harmless. Retire this workflow after a successful run.

on:
  workflow_dispatch:

permissions:
  contents: write

# Share the branch-write lock with publish.yml / refresh-stats.yml so this never
# races them on the catalog branch.
concurrency:
  group: branch-write
  cancel-in-progress: false

jobs:
  fold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: catalog
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      # The catalog branch has no scripts/ dir; fetch both scripts from main.
      - name: Fetch scripts from main
        run: |
          mkdir -p .ci
          curl -sfL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/fold-release-into-catalog.mjs" \
            -o .ci/fold-release-into-catalog.mjs
          curl -sfL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/aggregate-stats.mjs" \
            -o .ci/aggregate-stats.mjs

      # Default CATALOG_PATH is ./store/catalog.json — correct on the catalog branch.
      # fold rewrites the ledger seeds; aggregate rebuilds downloadCount from it.
      - name: Fold release ledger into catalog seeds
        run: node .ci/fold-release-into-catalog.mjs

      - name: Rebuild downloadCount from folded ledger
        run: node .ci/aggregate-stats.mjs

      - name: Commit if changed
        id: commit
        run: |
          rm -rf .ci
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A store/
          if git diff --cached --quiet; then
            echo "No changes — already folded."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: fold release ledger into catalog (one-time migration)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # jsdelivr's upstream may still see the previous commit; purging too early
      # re-caches the OLD catalog for ~12h. Mirror publish.yml's propagation wait.
      - name: Wait for propagation
        if: steps.commit.outputs.changed == 'true'
        run: sleep 120

      - name: Purge folded catalog.json from jsdelivr
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -sfL "https://purge.jsdelivr.net/gh/${{ github.repository }}@catalog/store/catalog.json" \
            || echo "purge failed (non-fatal)"
